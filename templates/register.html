
{% extends "base.html" %}
{% block content %}

<div class="page-hero">
  <h1><i class="fas fa-user-plus"></i> Passenger Registration</h1>
  <p>Create your SkyLink account for faster check-in</p>
</div>

<section class="section">
  <div class="container narrow">
    <div class="card form-card">
      <h2 class="form-title"><i class="fas fa-id-card"></i> Create Account</h2>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label>Full Name <span class="req">*</span></label>
          <input type="text" id="reg_name" placeholder="Juan dela Cruz" required/>
          <span class="err" id="err_reg_name"></span>
        </div>
        <div class="form-group">
          <label>Email Address <span class="req">*</span></label>
          <input type="email" id="reg_email" placeholder="juan@email.com" required/>
          <span class="err" id="err_reg_email"></span>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Contact Number <span class="req">*</span></label>
            <input type="text" id="reg_contact" placeholder="09XX-XXX-XXXX" required/>
            <span class="err" id="err_reg_contact"></span>
          </div>
          <div class="form-group">
            <label>Passport / PhilID Number <span class="req">*</span></label>
            <input type="text" id="reg_passport" placeholder="P1234567A" required/>
            <span class="err" id="err_reg_passport"></span>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary btn-full" id="regBtn">
            <i class="fas fa-user-plus"></i> Register Now
          </button>
        </div>
        <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Admin Login</a></p>
      </form>
    </div>
  </div>
</section>

{% endblock %}
{% block scripts %}
<script>
document.getElementById("registerForm").addEventListener("submit", async function(e){
  e.preventDefault();
  clearRegErrors();
  const btn = document.getElementById("regBtn");
  const name    = document.getElementById("reg_name").value.trim();
  const email   = document.getElementById("reg_email").value.trim();
  const contact = document.getElementById("reg_contact").value.trim();
  const passport= document.getElementById("reg_passport").value.trim();

  let valid = true;
  if(!name){ showRegErr("err_reg_name","Name is required."); valid=false; }
  if(!email){ showRegErr("err_reg_email","Email is required."); valid=false; }
  else if(!/^[^@]+@[^@]+\.[^@]+$/.test(email)){ showRegErr("err_reg_email","Invalid email."); valid=false; }
  if(!contact){ showRegErr("err_reg_contact","Contact is required."); valid=false; }
  if(!passport){ showRegErr("err_reg_passport","Passport/ID is required."); valid=false; }
  if(!valid) return;

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';

  const res = await fetch("/api/customers",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name,email,contact,passport})
  });
  const data = await res.json();
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-user-plus"></i> Register Now';

  if(data.success){
    showToast(`✅ Registered! Your ID: ${data.id}`, "success");
    setTimeout(() => { window.location.href = "{{ url_for('booking') }}"; }, 1500);
    document.getElementById("registerForm").reset();
  } else {
    showToast(data.error || "Registration failed.", "error");
  }
});
function clearRegErrors(){ document.querySelectorAll(".err").forEach(e=>e.textContent=""); }
function showRegErr(id,msg){ const el=document.getElementById(id); if(el) el.textContent=msg; }
</script>
{% endblock %}
